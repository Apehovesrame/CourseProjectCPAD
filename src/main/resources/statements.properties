# ==========================
# Автобусы (Bus)
# ==========================
sql.bus.find_all=SELECT * FROM buses ORDER BY model
sql.bus.find_by_id=SELECT * FROM buses WHERE bus_id = ?
sql.bus.insert=INSERT INTO buses (model, license_plate, seat_capacity, bus_image) VALUES (?, ?, ?, ?)
sql.bus.update=UPDATE buses SET model = ?, license_plate = ?, seat_capacity = ?, bus_image = ? WHERE bus_id = ?
sql.bus.delete=DELETE FROM buses WHERE bus_id = ?

# ==========================
# Водители (Driver)
# ==========================
sql.driver.find_all=SELECT * FROM drivers ORDER BY last_name, first_name
sql.driver.insert=INSERT INTO drivers (last_name, first_name, middle_name, age, passport, driver_image) VALUES (?, ?, ?, ?, ?, ?)
sql.driver.update=UPDATE drivers SET last_name = ?, first_name = ?, middle_name = ?, age = ?, passport = ?, driver_image = ? WHERE driver_id = ?
sql.driver.delete=DELETE FROM drivers WHERE driver_id = ?

# ==========================
# Пассажиры (Passenger)
# ==========================
sql.passenger.find_all=SELECT * FROM passengers ORDER BY last_name, first_name
sql.passenger.find_by_passport=SELECT * FROM passengers WHERE passport_number = ?
sql.passenger.insert=INSERT INTO passengers (last_name, first_name, middle_name, passport_number, birth_year) VALUES (?, ?, ?, ?, ?)
sql.passenger.update=UPDATE passengers SET last_name = ?, first_name = ?, middle_name = ?, passport_number = ?, birth_year = ? WHERE passenger_id = ?
sql.passenger.delete=DELETE FROM passengers WHERE passenger_id = ?

# ==========================
# Маршруты (Route)
# ==========================
sql.route.find_all=SELECT * FROM routes ORDER BY departure_point, destination_point
sql.route.insert=INSERT INTO routes (route_number, departure_point, destination_point, duration_minutes) VALUES (?, ?, ?, ?)
sql.route.update=UPDATE routes SET route_number = ?, departure_point = ?, destination_point = ?, duration_minutes = ? WHERE route_id = ?
sql.route.delete=DELETE FROM routes WHERE route_id = ?

# ==========================
# Остановки (Stop)
# ==========================
sql.stop.find_all=SELECT * FROM stops ORDER BY name

# ==========================
# Рейсы (Trip)
# ==========================
sql.trip.find_all = SELECT t.trip_id, t.departure_datetime, t.arrival_datetime, r.route_id, r.route_number, r.departure_point, r.destination_point, r.duration_minutes, b.bus_id, b.model, b.license_plate, b.seat_capacity FROM trips t JOIN routes r ON t.route_id = r.route_id JOIN buses b ON t.bus_id = b.bus_id ORDER BY t.departure_datetime ASC
sql.trip.insert_trip=INSERT INTO trips (route_id, bus_id, created_by_user_id, departure_datetime, arrival_datetime, is_deleted) VALUES (?, ?, ?, ?, ?, false)
sql.trip.insert_driver=INSERT INTO trips_drivers (trip_id, driver_id) VALUES (?, ?)
sql.trip.update_trip=UPDATE trips SET route_id = ?, bus_id = ?, departure_datetime = ?, arrival_datetime = ? WHERE trip_id = ?
sql.trip.delete_drivers=DELETE FROM trips_drivers WHERE trip_id = ?
sql.trip.delete_trip=UPDATE trips SET is_deleted = true WHERE trip_id = ?

# ==========================
# Билеты (Ticket)
# ==========================
sql.ticket.sell=SELECT sell_ticket_func(?, ?, ?, ?, ?, ?)
sql.ticket.find_all=SELECT * FROM Tickets
sql.ticket.find_by_id=SELECT * FROM Tickets WHERE ticket_id = ?
sql.ticket.find_by_trip_id=SELECT * FROM Tickets WHERE trip_id = ?

# ==========================
# Отчеты (Report)
# ==========================
sql.report.sales=SELECT r.destination_point, COUNT(t.ticket_id) as tickets_count, SUM(t.cost) as total_revenue FROM tickets t JOIN trips tr ON t.trip_id = tr.trip_id JOIN routes r ON tr.route_id = r.route_id WHERE DATE(tr.departure_datetime) >= ? AND DATE(tr.departure_datetime) <= ? GROUP BY r.destination_point ORDER BY tickets_count DESC

# ==========================
# Пользователи / Авторизация (User)
# ==========================
sql.user.authenticate=SELECT u.user_id, u.role_id, u.login, u.last_name, u.first_name, u.middle_name, r.role_name FROM authorizations a JOIN users u ON a.login = u.login LEFT JOIN roles r ON u.role_id = r.role_id WHERE a.login = ? AND a.password_hash = ?
sql.user.find_all_roles=SELECT * FROM roles
sql.user.find_all=SELECT u.*, r.role_name FROM users u JOIN roles r ON u.role_id = r.role_id ORDER BY u.last_name
sql.user.insert_auth=INSERT INTO authorizations (login, password_hash) VALUES (?, ?)
sql.user.insert_user=INSERT INTO users (login, last_name, first_name, middle_name, role_id) VALUES (?, ?, ?, ?, ?)
sql.user.find_login_by_id=SELECT login FROM users WHERE user_id = ?
sql.user.delete_user=DELETE FROM users WHERE user_id = ?
sql.user.delete_auth=DELETE FROM authorizations WHERE login = ?
sql.user.update_user=UPDATE users SET last_name=?, first_name=?, middle_name=?, role_id=? WHERE login=?
sql.user.update_auth=UPDATE authorizations SET password_hash=? WHERE login=?

sql.audit.find_all=SELECT * FROM audit_log ORDER BY changed_at DESC